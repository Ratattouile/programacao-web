<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planos de Cultivo - GREENHERB</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
    <script defer src="/frontend/js/planos.js"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=logout,notifications" />
</head>

<body class="app-layout">

    <header class="top-navbar">
        <div class="navbar-brand">
            <h2>🌱 GREENHERB</h2>
        </div>

        <nav class="navbar-nav">
            <ul>
                <li><a href="/frontend/views/home.html">Visão Geral</a></li>
                <li><a href="/frontend/views/lotes.html">Lotes de Cultivo</a></li>
                <li><a href="/frontend/views/plano.html" class="active">Planos de Cultivo</a></li>
                <li><a href="/frontend/views/tarefas.html">Tarefas</a></li>
                <li><a href="/frontend/views/alertas.html">Alertas</a></li>
            </ul>
        </nav>

        <div class="navbar-user">
            <button class="alert-btn" aria-label="Alertas">
                <span class="material-symbols-outlined" style="font-size:18px">notifications</span>
                <div class="alert-dot"></div>
            </button>
            <div class="nav-avatar">JG</div>
            <span id="userDisplay">Bem-vindo</span>
            <button id="logoutBtn" class="logout-btn">
                <span class="material-symbols-outlined" style="font-size: 18px;">logout</span>
                <span class="tooltip">Terminar sessão</span>
            </button>
        </div>
    </header>

    <main class="main-content">
        <header class="topbar">
            <h1>Planos de Cultivo</h1>
            <a id="btnNovoPlano" href="#" class="btn-primary"
                style="padding:10px;text-decoration: none; width: auto; border-radius: 5px;">+ Novo Plano</a>
        </header>

        <section class="content-area">
            <div class="cards-grid" style="margin-bottom: 1rem;">
                <div class="metric-card default">
                    <h3>Planos Regulares</h3>
                    <p class="card-value" id="contPlanosRegulares">-</p>
                </div>
                <div class="metric-card warn">
                    <h3>Planos de Emergência</h3>
                    <p class="card-value" id="contPlanosPontuais">-</p>
                </div>
            </div>

            <div class="card mt-2">
                <div class="section-title-row">
                    <h2>Todos os Planos</h2>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Nome do Plano</th>
                            <th>Erva Aromática</th>
                            <th>Tipo</th>
                            <th>Automação</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaPlanos">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="modalNovoPlano" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h2>Novo Plano</h2>
            <form id="formNovoPlano">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="planoNome" required>
                </div>
                <div class="form-group">
                    <label>Erva Aromática</label>
                    <input type="text" id="planoErva" required>
                </div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="planoTipo" required>
                        <option value="Regular">Regular</option>
                        <option value="Pontual">Pontual</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Automação</label>
                    <input type="text" id="planoAutomacao" required>
                </div>
                <div class="actions-group">
                    <button type="submit" class="btn-primary">Criar</button>
                    <button type="button" id="btnFecharModalPlano" class="btn-action ghost">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
