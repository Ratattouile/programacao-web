<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <script defer src="/js/register.js"></script>
    <title>Register - GREENHERB</title>
</head>
<body class="login-bg">
    <div class="login-container">
        <div class="login-header">
            <h1>GREENHERB</h1>
            <p>Registar Novo Funcionário</p>
        </div>
        <form id="registerForm">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Ex: Maria Silva" required>
            </div>

            <div class="form-group">
                <label for="perfil">Perfil</label>
                <select id="perfil" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 4px;">
                    <option value="Técnico">Técnico</option>
                    <option value="Responsável">Responsável Técnico</option>
                    <option value="Administrador">Administrador</option>
                </select>
            </div>

            <div class="form-group">
                <label for="regUsername">Username</label>
                <input type="text" id="regUsername" required>
            </div>
            
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" required>
            </div>
            
            <button type="submit" class="btn-primary">Criar Conta</button>
            
            <div style="text-align: center; margin-top: 15px;">
                <a href="/views/login.html" style="color: var(--text-main); text-decoration: none; font-size: 0.9rem;">Já tenho conta (Voltar ao Login)</a>
            </div>
        </form>
    </div>
    
</body>
</html>
