<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/frontend/css/style.css">
    <script defer src="/frontend/js/register.js"></script>
    <title>Register - GREENHERB</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=logout" />
         <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body class="login-bg">
    <div class="login-container">
        <div class="login-header">
            <h1>GREENHERB</h1>
            <p>Registar Novo Funcionário</p>
        </div>
        <div class="gh-divider">
            <div class="gh-divider-dot"></div>
        </div>
        <form id="registerForm">
            <div class="form-group">
                <label for="nome">NOME COMPLETO</label>
                <input type="text" id="nome" placeholder="Ex: Maria Silva" required>
            </div>

            <div class="form-group">
                <label for="perfil">PERFIL</label>
                <select id="perfil" required>
                    <option value="Técnico">Técnico</option>
                    <option value="Responsável">Responsável Técnico</option>
                    <option value="Administrador">Administrador</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>USERNAME</label>
                    <input id="regUsername" class="username" type="text" placeholder="Type your username"/>
                </div>
                <div class="form-group">
                    <label>PASSWORD</label>
                    <input id="regPassword" class="password" type="password" placeholder="Type your password"/>
                </div>
            </div>

            <button type="submit" class="btn-primary">CRIAR CONTA</button>

            <div style="text-align: center; margin-top: 15px;">
                <a href="/frontend/views/login.html" class="voltar-login">Já tens conta? <u>Voltar ao
                    Login</u></a>
            </div>
        </form>
    </div>

</body>

</html>
