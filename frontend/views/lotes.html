<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotes de Cultivo - GREENHERB</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
    <script defer src="/frontend/js/lotes.js"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=logout,notifications" />
</head>

<body class="app-layout">

    <header class="top-navbar">
        <div class="navbar-brand">
            <h2>🌱 GREENHERB</h2>
        </div>

        <nav class="navbar-nav">
            <ul>
                <li><a href="/frontend/views/home.html">Visão Geral</a></li>
                <li><a href="/frontend/views/lotes.html" class="active">Lotes de Cultivo</a></li>
                <li><a href="/frontend/views/plano.html">Planos de Cultivo</a></li>
                <li><a href="/frontend/views/tarefas.html">Tarefas</a></li>
                <li><a href="/frontend/views/alertas.html">Alertas</a></li>
            </ul>
        </nav>

        <div class="navbar-user">
            <button class="alert-btn" aria-label="Alertas">
                <span class="material-symbols-outlined" style="font-size:18px">notifications</span>
                <div class="alert-dot"></div>
            </button>
            <div class="nav-avatar">JG</div>
            <span id="userDisplay">Bem-vindo</span>
            <button id="logoutBtn" class="logout-btn">
                <span class="material-symbols-outlined" style="font-size: 18px;">logout</span>
                <span class="tooltip">Terminar sessão</span>
            </button>
        </div>
    </header>

    <main class="main-content">
        <header class="topbar">
            <h1>Gestão de Lotes de Cultivo</h1>
            <button id="btnNovoLote" class="btn-primary" style="width: auto; margin: 0;">+ Novo Lote</button>
        </header>

        <section class="content-area">
            <div class="cards-grid" style="margin-bottom: 1rem;">
                <div class="metric-card default">
                    <h3>Produtividade Média</h3>
                    <p class="card-value">92%</p>
                </div>
            </div>

            <div class="card mt-2">
                <div class="section-title-row">
                    <h2>Todos os Lotes</h2>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID do Lote</th>
                            <th>Erva Aromática</th>
                            <th>Plano Associado</th>
                            <th>Data Início</th>
                            <th>Estado</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaLotes">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="modalNovoLote" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h2>Novo Lote</h2>
            <form id="formNovoLote">
                <div class="form-group">
                    <label>Erva Aromática</label>
                    <input type="text" id="loteErva" required>
                </div>
                <div class="form-group">
                    <label>Plano Associado</label>
                    <select id="lotePlano" required></select>
                </div>
                <div class="form-group">
                    <label>Quantidade Inicial</label>
                    <input type="number" id="loteQuantidade" required>
                </div>
                <div class="actions-group">
                    <button type="submit" class="btn-primary">Criar</button>
                    <button type="button" id="btnFecharModal" class="btn-action ghost">Cancelar</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
