<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard -GREENHERB</title>
    <link rel="stylesheet" href="/css/style.css">
    <script defer src="/js/home.js"></script>
    <script defer src="/js/db.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=logout" />

</head>
<body class="app-layout">
    <header class="top-navbar">
        <div class="navbar-brand">
            <h2>🌱 GREENHERB</h2>
        </div>
        
        <nav class="navbar-nav">
            <ul>
                <li><a href="/views/home.html" class="active">Visão Geral</a></li>
                <li><a href="/views/lotes.html">Lotes de Cultivo</a></li>
                <li><a href="/views/plano.html">Planos de Cultivo</a></li>
                <li><a href="/views/tarefas.html">Tarefas</a></li>
                <li><a href="/views/alertas.html">Alertas</a></li>
            </ul>
        </nav>

        <div class="navbar-user">
            <span id="userDisplay">Bem-vindo</span>
            <button id="logoutBtn" class="logout-btn">
                <span class="material-symbols-outlined" style="font-size: 18px;">logout</span>
                <span class="tooltip">Terminar sessão</span>
            </button>
        </div>
    </header>
    <main class="main-content">
        <header class="topbar">
            <h1>Visão Geral da Estufa</h1>
            <div class="status-indicator">
                <span class="status-dot green"></span> Sistema Normal
            </div>
        </header>

        <section class="content-area">
            <div class="cards-grid">
                <div class="card">
                    <h3>Lotes Ativos</h3>
                    <p class="card-value">12</p>
                </div>
                <div class="card">
                    <h3>Alertas Pendentes</h3>
                    <p class="card-value warning">3</p>
                </div>
                <div class="card">
                    <h3>Tarefas Hoje</h3>
                    <p class="card-value">8</p>
                </div>
            </div>

            <div class="card mt-2">
                <h2>Lotes Recentes</h2>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID do Lote</th>
                            <th>Erva Aromática</th>
                            <th>Estado</th>
                            <th>Plano</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaLotes">
                        
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    
</body>
</html>
